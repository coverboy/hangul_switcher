name: build-windows
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - run: dotnet publish -c Release -o publish
      - shell: pwsh
        run: Compress-Archive -Path publish\* -DestinationPath hangul_switcher.zip
      - uses: actions/upload-artifact@v4
        with:
          name: hangul_switcher-windows
          path: hangul_switcher.zip
          if-no-files-found: error