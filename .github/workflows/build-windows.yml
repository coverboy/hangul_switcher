name: build-windows
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Publish (self-contained, 런타임 포함)
        run: dotnet publish -c Release -o publish-sc
      - name: Zip bundled
        shell: pwsh
        run: Compress-Archive -Path publish-sc\* -DestinationPath hangul_switcher-bundled.zip

      - name: Publish (framework-dependent, 런타임 별도 필요)
        run: dotnet publish -c Release -p:SelfContained=false -p:IncludeNativeLibrariesForSelfExtract=false -p:EnableCompressionInSingleFile=false -o publish-fd
      - name: Zip fxdep
        shell: pwsh
        run: Compress-Archive -Path publish-fd\* -DestinationPath hangul_switcher-fxdep.zip

      - uses: actions/upload-artifact@v4
        with:
          name: hangul_switcher-windows-bundled
          path: hangul_switcher-bundled.zip
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: hangul_switcher-windows-fxdep
          path: hangul_switcher-fxdep.zip
          if-no-files-found: error