name: build-windows
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Set version tag
        id: ver
        shell: pwsh
        run: |
          $tag = "v$(Get-Date -Format 'yyyy.MM.dd').${{ github.run_number }}"
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish (self-contained, 런타임 포함)
        run: dotnet publish -c Release -o publish-standalone

      - name: Publish (framework-dependent, 런타임 별도)
        run: dotnet publish -c Release -p:SelfContained=false -p:IncludeNativeLibrariesForSelfExtract=false -p:EnableCompressionInSingleFile=false -o publish-needsdotnet

      - name: Zip Standalone
        shell: pwsh
        run: Compress-Archive -Path publish-standalone\* -DestinationPath HangulSwitcher-Standalone.zip

      - name: Zip NeedsDotNet
        shell: pwsh
        run: Compress-Archive -Path publish-needsdotnet\* -DestinationPath HangulSwitcher-NeedsDotNet.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: ${{ steps.ver.outputs.tag }}
          files: |
            HangulSwitcher-Standalone.zip
            HangulSwitcher-NeedsDotNet.zip
          generate_release_notes: true
